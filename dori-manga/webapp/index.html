<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>どり漫画DB 管理画面</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --pink:#d4537e; --pink-2:#f08caf; --pink-3:#fff1f6; --bg:#fbf7f9;
    --line:#ead6de; --text:#2f2930; --muted:#786b72; --card:#fff;
    --ok:#25855a; --ng:#c3403d; --close:#bf7a18; --warn:#9a6b00;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; background:var(--bg); color:var(--text); }
  header { background:var(--pink); color:#fff; padding:12px 18px; display:flex; justify-content:space-between; gap:12px; align-items:center; }
  header h1 { font-size:18px; margin:0; letter-spacing:0; }
  .header-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .manual-download { color:#fff; border:1px solid rgba(255,255,255,.65); border-radius:7px; padding:6px 10px; text-decoration:none; font-size:12px; font-weight:700; }
  .manual-download:hover { background:rgba(255,255,255,.15); }
  main { max-width:1180px; margin:0 auto; padding:16px; }
  button, input, select, textarea { font:inherit; }
  button { border:0; border-radius:7px; padding:9px 13px; background:var(--pink); color:#fff; cursor:pointer; font-weight:700; }
  button:hover { background:#bd416b; }
  button:disabled { opacity:.55; cursor:not-allowed; }
  button.secondary { background:#fff; color:var(--pink); border:1px solid var(--pink-2); }
  button.ghost { background:transparent; color:var(--pink); border:1px solid var(--line); }
  button.danger { background:#b3261e; }
  button.small { padding:6px 10px; font-size:12px; }
  input, select, textarea { width:100%; border:1px solid var(--line); border-radius:7px; padding:8px; background:#fff; color:var(--text); }
  textarea { min-height:88px; resize:vertical; }
  label { display:block; font-size:12px; font-weight:700; color:var(--muted); margin:8px 0 4px; }
  a { color:var(--pink); }
  .hidden { display:none !important; }
  .login { max-width:360px; margin:64px auto; background:#fff; border:1px solid var(--line); border-radius:8px; padding:20px; }
  .tabs { display:flex; gap:8px; border-bottom:1px solid var(--line); margin-bottom:14px; overflow:auto; }
  .tab-btn { border-radius:7px 7px 0 0; background:#fff; color:var(--muted); border:1px solid var(--line); border-bottom:0; min-width:110px; }
  .tab-btn.active { background:var(--pink); color:#fff; border-color:var(--pink); }
  .toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:10px 0; }
  .panel { display:none; }
  .panel.active { display:block; }
  .section { background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px; margin-bottom:14px; }
  .section h2 { margin:0 0 10px; font-size:16px; color:var(--pink); }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .grid-3 { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; }
  .alert { padding:10px 12px; border-radius:7px; margin:9px 0; font-size:13px; white-space:pre-wrap; }
  .alert.ok { background:#e6f4ea; color:#17633f; }
  .alert.err { background:#fdecea; color:#b3261e; }
  .alert.warn { background:#fff4e0; color:var(--warn); }
  .alert.info { background:#eef4ff; color:#25507a; }
  .status-badge { display:inline-block; padding:2px 7px; border-radius:999px; font-size:11px; color:#fff; font-weight:700; }
  .OK { background:var(--ok); } .NG { background:var(--ng); } .CLOSE { background:var(--close); }
  .stat-row { display:grid; grid-template-columns:repeat(6, minmax(120px, 1fr)); gap:8px; }
  .stat { border:1px solid var(--line); border-radius:8px; padding:10px; background:var(--pink-3); }
  .stat .num { font-size:22px; font-weight:800; color:var(--pink); }
  .stat .lbl { font-size:12px; color:var(--muted); }
  .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:8px; background:#fff; }
  table { width:100%; border-collapse:collapse; min-width:1060px; font-size:13px; }
  th, td { border-bottom:1px solid var(--line); padding:7px; vertical-align:top; }
  th { background:var(--pink-3); color:#59434c; position:sticky; top:0; z-index:1; text-align:left; }
  td textarea { min-height:54px; min-width:145px; font-size:12px; line-height:1.45; }
  td input { min-width:150px; }
  .title-cell { min-width:180px; font-weight:700; }
  .folder-link { font-size:11px; display:block; margin-top:4px; }
  .save-state { font-size:11px; color:var(--muted); min-height:16px; }
  .prompt-box textarea { min-height:180px; font-size:12px; line-height:1.45; }
  .history table { min-width:760px; }
  .compact { font-size:12px; color:var(--muted); }
  .file-line { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  @media (max-width:760px) {
    main { padding:10px; }
    .grid-2, .grid-3, .stat-row { grid-template-columns:1fr; }
    header { align-items:flex-start; flex-direction:column; }
  }
</style>
</head>
<body>
<header>
  <h1>どり漫画DB 管理画面</h1>
  <div class="header-actions">
    <a class="manual-download" href="./dori-manga-admin-manual.pdf" download>マニュアルPDF</a>
    <button class="small hidden" id="logout-btn">ログアウト</button>
  </div>
</header>

<main>
  <div id="login-view" class="login">
    <h2>ログイン</h2>
    <label for="password">パスワード</label>
    <input type="password" id="password" autocomplete="current-password">
    <button id="login-btn" style="width:100%;margin-top:12px;">ログイン</button>
    <div id="login-msg"></div>
  </div>

  <div id="app-view" class="hidden">
    <nav class="tabs" id="tabs"></nav>

    <section id="tab-production" class="panel">
      <div class="section">
        <h2>制作</h2>
        <div class="toolbar">
          <button id="new-episode-btn" onclick="openNewEpisodeForm()">新しい漫画を作る</button>
          <button class="secondary" id="csv-import-open-btn" onclick="openCsvImport()">CSVインポート</button>
          <button class="secondary" id="csv-export-btn" onclick="exportCsv()">CSVエクスポート</button>
          <button class="ghost" id="reload-btn" onclick="loadAll()">再読込</button>
        </div>
        <div class="hidden" id="new-episode-section">
          <div class="grid-2">
            <div>
              <label for="new-episode-title">新しい漫画のタイトル</label>
              <input id="new-episode-title">
            </div>
            <div class="toolbar" style="align-items:end;">
              <button id="new-episode-create-btn" onclick="createEpisodeFromForm()">作成</button>
              <button class="ghost" id="new-episode-cancel-btn" onclick="closeNewEpisodeForm()">閉じる</button>
            </div>
          </div>
        </div>
        <div class="toolbar" id="status-filters"></div>
        <div id="production-msg"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>作業</th><th>タイトル</th><th>状態</th>
                <th>1コマ案</th><th>2コマ案</th><th>3コマ案</th><th>4コマ案</th>
                <th>投稿案</th><th>PDF URL</th>
              </tr>
            </thead>
            <tbody id="episode-rows"></tbody>
          </table>
        </div>
      </div>

      <div class="section hidden" id="csv-import-section">
        <h2>CSVインポート</h2>
        <input type="file" id="csv-file" accept=".csv,text/csv">
        <div class="toolbar">
          <button id="csv-import-btn" onclick="importCsv()">取込を実行</button>
          <button class="ghost" id="csv-import-close-btn" onclick="closeCsvImport()">閉じる</button>
        </div>
        <div id="csv-msg"></div>
      </div>
    </section>

    <section id="tab-import" class="panel">
      <div class="section">
        <h2>評価プロンプト</h2>
        <div class="toolbar">
          <button class="secondary" id="copy-prompt-OK" onclick="copyPrompt('OK')">OKをコピー</button>
          <button class="secondary" id="copy-prompt-NG" onclick="copyPrompt('NG')">NGをコピー</button>
          <button class="secondary" id="copy-prompt-CLOSE" onclick="copyPrompt('CLOSE')">CLOSEをコピー</button>
        </div>
        <div id="prompt-copy-msg"></div>
      </div>

      <div class="section">
        <h2>画像評価を登録</h2>
        <div class="grid-3">
          <div>
            <label for="import-episode">作品</label>
            <select id="import-episode"></select>
          </div>
          <div>
            <label for="import-panel">コマ番号</label>
            <select id="import-panel">
              <option value="1">1コマ目</option><option value="2">2コマ目</option>
              <option value="3">3コマ目</option><option value="4">4コマ目</option>
            </select>
          </div>
          <div>
            <label for="import-status">判定</label>
            <select id="import-status">
              <option value="OK">OK</option><option value="NG">NG</option><option value="CLOSE">CLOSE</option>
            </select>
          </div>
        </div>
        <label for="import-file">画像ファイル</label>
        <input type="file" id="import-file" accept="image/*">
        <label for="import-json">ChatGPT JSON</label>
        <textarea id="import-json" placeholder='{"attempt_number":1,"final_generation_prompt":"...","evaluation_summary":"...","evaluation_json":{"result":"OK"}}'></textarea>
        <button id="image-import-btn" onclick="importImage()">画像をDriveへアップロードしてDB登録</button>
        <div id="image-import-msg"></div>
      </div>

      <div class="section history">
        <h2>最近の登録履歴</h2>
        <div id="history"></div>
      </div>
    </section>

    <section id="tab-admin" class="panel">
      <div class="section">
        <h2>システム状態</h2>
        <div id="system-status"></div>
        <div class="stat-row" id="stats"></div>
      </div>

      <div class="section">
        <h2>Drive親フォルダ</h2>
        <div id="drive-root-link" class="compact"></div>
        <div class="grid-2">
          <div>
            <label for="drive-root-url">親フォルダURL</label>
            <input id="drive-root-url" placeholder="https://drive.google.com/drive/folders/...">
          </div>
          <div>
            <label for="drive-root-id">親フォルダID</label>
            <input id="drive-root-id" placeholder="フォルダID">
          </div>
        </div>
        <button id="save-drive-root-btn" onclick="saveDriveRoot()">Drive親フォルダ設定を保存</button>
        <div id="drive-root-msg"></div>
      </div>

      <div class="section prompt-box">
        <h2>評価プロンプト登録</h2>
        <div class="grid-3">
          <div><label for="prompt-OK">OK</label><textarea id="prompt-OK"></textarea></div>
          <div><label for="prompt-NG">NG</label><textarea id="prompt-NG"></textarea></div>
          <div><label for="prompt-CLOSE">CLOSE</label><textarea id="prompt-CLOSE"></textarea></div>
        </div>
        <button id="save-prompts-btn" onclick="savePrompts()">評価プロンプトを保存</button>
        <div id="prompt-save-msg"></div>
      </div>

      <div class="section">
        <h2>CSV</h2>
        <button class="secondary" id="csv-template-btn" onclick="downloadTemplate()">CSVテンプレートをダウンロード</button>
      </div>
    </section>
  </div>
</main>

<script>
const SUPABASE_URL  = "https://vdntqwtywxyjxelycavx.supabase.co";
const SUPABASE_ANON = "sb_publishable_b8a4K90d5R6S5RZReLa-HA_G6nNwKKW";
const LOGIN_EMAIL   = "s.jinnouchi@yumekango.com";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const STATUSES = ["完成", "未完成", "不採用"];
const CSV_STATUSES = ["新規作成", ...STATUSES];
const EVAL_STATUSES = ["OK", "NG", "CLOSE"];
const DUPLICATE_REPAIR_WINDOW_MS = 10 * 60 * 1000;
const PROMPT_NAMES = { OK:"評価プロンプト_OK", NG:"評価プロンプト_NG", CLOSE:"評価プロンプト_CLOSE" };
const TABS = [
  { id:"production", label:"制作" },
  { id:"import", label:"インポート" },
  { id:"admin", label:"管理" },
];
const state = { session:null, episodes:[], prompts:{}, settings:{}, filter:"すべて", activeTab:"production" };
const saveTimers = new Map();
const $ = id => document.getElementById(id);
const esc = value => String(value ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
const msg = (id, type, text) => { $(id).innerHTML = text ? `<div class="alert ${type}">${esc(text)}</div>` : ""; };

async function init() {
  renderTabs();
  bindEvents();
  const { data:{ session } } = await sb.auth.getSession();
  state.session = session;
  session ? await showApp() : showLogin();
}

function renderTabs() {
  $("tabs").innerHTML = TABS.map(tab => `<button class="tab-btn" data-tab="${tab.id}" onclick="setTab('${tab.id}')">${tab.label}</button>`).join("");
  document.querySelectorAll(".tab-btn").forEach(btn => btn.onclick = () => setTab(btn.dataset.tab));
}

function setTab(tabId) {
  state.activeTab = tabId;
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tabId));
  document.querySelectorAll(".panel").forEach(panel => panel.classList.toggle("active", panel.id === `tab-${tabId}`));
  if (tabId === "import") renderImportEpisodeOptions();
}
window.setTab = setTab;

function openNewEpisodeForm() {
  $("new-episode-section").classList.remove("hidden");
  $("new-episode-title").focus();
}
window.openNewEpisodeForm = openNewEpisodeForm;

function closeNewEpisodeForm() {
  $("new-episode-section").classList.add("hidden");
}
window.closeNewEpisodeForm = closeNewEpisodeForm;

function openCsvImport() {
  $("csv-import-section").classList.remove("hidden");
}
window.openCsvImport = openCsvImport;

function closeCsvImport() {
  $("csv-import-section").classList.add("hidden");
}
window.closeCsvImport = closeCsvImport;

function bindEvents() {
  $("login-btn").onclick = login;
  $("password").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
  $("logout-btn").onclick = async () => { await sb.auth.signOut(); location.reload(); };
  $("reload-btn").onclick = loadAll;
  $("new-episode-btn").onclick = openNewEpisodeForm;
  $("new-episode-cancel-btn").onclick = closeNewEpisodeForm;
  $("new-episode-create-btn").onclick = createEpisodeFromForm;
  $("new-episode-title").addEventListener("keydown", e => { if (e.key === "Enter") createEpisodeFromForm(); });
  bindProductionDelegates();
  $("csv-import-open-btn").onclick = openCsvImport;
  $("csv-import-close-btn").onclick = closeCsvImport;
  $("csv-export-btn").onclick = exportCsv;
  $("csv-template-btn").onclick = downloadTemplate;
  $("csv-import-btn").onclick = importCsv;
  $("image-import-btn").onclick = importImage;
  $("save-drive-root-btn").onclick = saveDriveRoot;
  $("save-prompts-btn").onclick = savePrompts;
  $("copy-prompt-OK").onclick = () => copyPrompt("OK");
  $("copy-prompt-NG").onclick = () => copyPrompt("NG");
  $("copy-prompt-CLOSE").onclick = () => copyPrompt("CLOSE");
}

function showLogin() {
  $("login-view").classList.remove("hidden");
  $("app-view").classList.add("hidden");
  $("logout-btn").classList.add("hidden");
}

async function showApp() {
  $("login-view").classList.add("hidden");
  $("app-view").classList.remove("hidden");
  $("logout-btn").classList.remove("hidden");
  setTab(state.activeTab);
  await loadAll();
}

async function login() {
  $("login-btn").disabled = true;
  const { data, error } = await sb.auth.signInWithPassword({ email: LOGIN_EMAIL, password: $("password").value });
  $("login-btn").disabled = false;
  if (error) return msg("login-msg", "err", "ログインできませんでした。パスワードを確認してください。");
  state.session = data.session;
  await showApp();
}

async function loadAll() {
  await Promise.all([loadEpisodes(), loadPrompts(), loadSettings(), loadHistory(), loadStats()]);
  renderProduction();
  renderImportEpisodeOptions();
  renderAdmin();
}
window.loadAll = loadAll;

async function loadEpisodes() {
  const { data, error } = await sb.from("manga_episodes")
    .select("id,title,status,post_text,pdf_url,drive_folder_id,drive_folder_url,is_working,created_at,manga_panels(id,panel_number,scene_text,status)")
    .order("created_at", { ascending:false });
  if (error) throwUi("production-msg", error);
  state.episodes = (data || []).map(ep => ({
    ...ep,
    panels: [1,2,3,4].map(n => (ep.manga_panels || []).find(p => p.panel_number === n) || { panel_number:n, scene_text:"" }),
  }));
}

async function loadPrompts() {
  const { data, error } = await sb.from("prompt_templates")
    .select("id,name,template_text,is_active,created_at")
    .in("name", Object.values(PROMPT_NAMES))
    .eq("is_active", true)
    .order("created_at", { ascending:false });
  if (error) throwUi("prompt-copy-msg", error);
  state.prompts = {};
  for (const status of EVAL_STATUSES) {
    state.prompts[status] = (data || []).find(row => row.name === PROMPT_NAMES[status]) || null;
  }
}

async function loadSettings() {
  const { data, error } = await sb.from("app_settings").select("key,value");
  if (error) throwUi("drive-root-msg", error);
  state.settings = Object.fromEntries((data || []).map(row => [row.key, row.value || ""]));
}

async function loadStats() {
  const latest = await sb.from("generation_attempts").select("created_at").order("created_at", { ascending:false }).limit(1);
  const counts = await Promise.all([
    sb.from("manga_episodes").select("id", { count:"exact", head:true }),
    ...STATUSES.map(status => sb.from("manga_episodes").select("id", { count:"exact", head:true }).eq("status", status)),
    sb.from("generation_attempts").select("id", { count:"exact", head:true }),
    sb.from("prompt_lessons").select("id", { count:"exact", head:true }).eq("is_active", true),
    sb.from("generation_attempts").select("id", { count:"exact", head:true }).contains("evaluation_json", { repair_needed:true }),
  ]);
  if (latest.error) return msg("system-status", "err", "Supabase疎通に失敗しました。\n" + latest.error.message);
  const duplicateRepairCount = await countNearDuplicateRepairs();
  const last = latest.data?.[0]?.created_at ? new Date(latest.data[0].created_at) : null;
  $("system-status").innerHTML = `<div class="alert ok">Supabase疎通OK</div>` +
    `<div class="compact">最終DB登録日時: ${last ? last.toLocaleString("ja-JP") : "未登録"} / keepaliveはGitHub Actionsで定期実行</div>`;
  $("stats").innerHTML = [
    ["作品数", counts[0].count], ["完成", counts[1].count], ["未完成", counts[2].count],
    ["不採用", counts[3].count], ["画像評価数", counts[4].count], ["改善ルール数", counts[5].count],
    ["JSON補修対象", counts[6].count], ["近接重複疑い", duplicateRepairCount],
  ].map(([label, count]) => `<div class="stat"><div class="num">${count ?? "-"}</div><div class="lbl">${label}</div></div>`).join("");
}

async function countNearDuplicateRepairs() {
  const { data, error } = await sb.from("generation_attempts")
    .select("id,panel_id,file_name,created_at")
    .not("file_name", "is", null)
    .order("created_at", { ascending:false })
    .limit(1000);
  if (error) {
    console.warn("near duplicate repair count failed", error.message);
    return "-";
  }
  const groups = new Map();
  for (const row of data || []) {
    const fileName = String(row.file_name || "").trim();
    if (!row.panel_id || !fileName) continue;
    const key = `${row.panel_id}\n${fileName}`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(row);
  }
  let count = 0;
  for (const rows of groups.values()) {
    rows.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    for (let i = 1; i < rows.length; i += 1) {
      const prev = new Date(rows[i - 1].created_at).getTime();
      const current = new Date(rows[i].created_at).getTime();
      if (Number.isFinite(prev) && Number.isFinite(current) && current - prev <= DUPLICATE_REPAIR_WINDOW_MS) count += 1;
    }
  }
  return count;
}

async function loadHistory() {
  const { data, error } = await sb.from("generation_attempts")
    .select("created_at,attempt_number,result_status,evaluation_summary,file_name,image_url,manga_panels!generation_attempts_panel_id_fkey(panel_number,manga_episodes(title))")
    .order("created_at", { ascending:false }).limit(12);
  if (error) { $("history").textContent = "読み込みエラー"; return; }
  $("history").innerHTML = `<div class="table-wrap"><table><tr><th>日付</th><th>作品</th><th>コマ</th><th>回</th><th>判定</th><th>評価</th></tr>` +
    (data || []).map(r => `<tr><td>${new Date(r.created_at).toLocaleDateString("ja-JP")}</td><td>${esc(r.manga_panels?.manga_episodes?.title ?? "-")}</td><td>${r.manga_panels?.panel_number ?? "-"}</td><td>${r.attempt_number ?? "-"}</td><td><span class="status-badge ${esc(r.result_status)}">${esc(r.result_status)}</span></td><td>${esc(r.evaluation_summary || "").slice(0, 80)}</td></tr>`).join("") +
    `</table></div>`;
}

function renderProduction() {
  renderFilters();
  const episodes = state.filter === "すべて" ? state.episodes : state.episodes.filter(ep => ep.status === state.filter);
  $("episode-rows").innerHTML = episodes.map(ep => `
    <tr data-episode-id="${ep.id}">
      <td><input type="checkbox" data-action="working" ${ep.is_working ? "checked" : ""}></td>
      <td class="title-cell">${esc(ep.title)}${ep.drive_folder_url ? `<a class="folder-link" href="${esc(ep.drive_folder_url)}" target="_blank">Driveフォルダ</a>` : `<button class="small secondary" data-action="create-folder">フォルダ作成</button>`}<div class="save-state" id="save-${ep.id}-title"></div></td>
      <td><select data-episode-field="status">${STATUSES.map(s => `<option value="${s}" ${ep.status === s ? "selected" : ""}>${s}</option>`).join("")}</select></td>

function bindProductionDelegates() {
  const body = $("episode-rows");
  body.addEventListener("click", event => {
    const row = event.target.closest("tr[data-episode-id]");
    if (!row) return;
    if (event.target.closest('[data-action="create-folder"]')) {
      window.createFolderForEpisodeId(row.dataset.episodeId);
    }
  });
  body.addEventListener("change", event => {
    const row = event.target.closest("tr[data-episode-id]");
    if (!row) return;
    if (event.target.matches('[data-action="working"]')) {
      setWorking(row.dataset.episodeId, event.target.checked);
      return;
    }
    if (event.target.matches('select[data-episode-field="status"]')) {
      saveEpisodeField(row.dataset.episodeId, "status", event.target.value);
    }
  });
  body.addEventListener("focusout", event => {
    const row = event.target.closest("tr[data-episode-id]");
    if (!row) return;
    if (event.target.matches("[data-episode-field]")) {
      saveEpisodeField(row.dataset.episodeId, event.target.dataset.episodeField, event.target.value);
      return;
    }
    if (event.target.matches("[data-panel-number]")) {
      savePanelScene(row.dataset.episodeId, Number(event.target.dataset.panelNumber), event.target.value);
    }
  });
  body.addEventListener("input", event => {
    const row = event.target.closest("tr[data-episode-id]");
    if (!row) return;
    if (event.target.matches("[data-episode-field]")) {
      scheduleEpisodeSave(row.dataset.episodeId, event.target.dataset.episodeField, event.target.value);
      return;
    }
    if (event.target.matches("[data-panel-number]")) {
      schedulePanelSave(row.dataset.episodeId, Number(event.target.dataset.panelNumber), event.target.value);
    }
  });
}

function scheduleSave(key, action) {

}

async function callFunction(name, payload) {
  const { data:{ session } } = await sb.auth.getSession();
  if (!session?.access_token) throw new Error("ログイン情報がありません。再ログインしてください。");
  const res = await fetch(`${SUPABASE_URL}/functions/v1/${name}`, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "apikey":SUPABASE_ANON, "Authorization":`Bearer ${session.access_token}` },
    body:JSON.stringify(payload),
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) {
    const error = new Error(json.message || `${name} failed: HTTP ${res.status}`);
    error.code = json.code;
    throw error;
  }
  return json;
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return;
  } catch {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "fixed";
    textarea.style.left = "-9999px";
    document.body.appendChild(textarea);
    textarea.select();
    const ok = document.execCommand("copy");
    textarea.remove();
    if (!ok) throw new Error("ブラウザがクリップボード書き込みを許可しませんでした。");
  }
}

async function importImage() {
  const episodeId = $("import-episode").value;
  const ep = state.episodes.find(item => item.id === episodeId);
  const file = $("import-file").files[0];
  if (!ep) return msg("image-import-msg", "err", "作品を選択してください。");
  if (!file) return msg("image-import-msg", "err", "画像ファイルを選択してください。");
  if (file.size > 10 * 1024 * 1024) return msg("image-import-msg", "err", "画像サイズが10MBを超えています。画像を圧縮してください。");
  const resultStatus = $("import-status").value;
  const jsonText = $("import-json").value.trim();
  const parsedInfo = parseImportJson(jsonText, resultStatus);
  if (parsedInfo.ok) {
    const jsonResult = String(parsedInfo.payload.evaluation_json?.result || parsedInfo.payload.result_status || "").toUpperCase();
    if (jsonResult && jsonResult !== resultStatus && !confirm(`画面の判定は「${resultStatus}」、JSONの評価は「${jsonResult}」です。「${resultStatus}」で登録しますか？`)) return;
  }

  $("image-import-btn").disabled = true;
  try {
    const contentBase64 = await fileToBase64(file);
    let uploaded;
    try {
      uploaded = await callFunction("upload-image", {
        episode_id:episodeId,
        result_status:resultStatus,
        file_name:file.name,
        content_type:file.type || "application/octet-stream",
        content_base64:contentBase64,
      });
    } catch (error) {
      if (error.code === "episode_folder_missing" || error.code === "status_folder_missing") {
        renderFolderRecovery("image-import-msg", error.message, episodeId);
        return;
      }
      throw error;
    }
    const attemptNumber = await resolveAttemptNumber(
      parsedInfo.payload.attempt_number,
      episodeId,
      Number($("import-panel").value),
    );
    const payload = {
      ...parsedInfo.payload,
      attempt_number:attemptNumber,
      result_status:resultStatus,
      panel_number:Number($("import-panel").value),
      episode_title:ep.title,
      image_url:uploaded.web_view_link,
      drive_file_id:uploaded.file_id,
      file_name:file.name,
    };
    const { data, error } = await sb.rpc("import_generation_attempt", { payload });
    if (error) throw new Error(error.message);
    if (data?.status === "duplicate") {
      msg("image-import-msg", "warn", `同じコマ・試行回数は登録済みです。画像はDriveに残っています。\n${data.message || ""}`);
    } else {
      const jsonNote = parsedInfo.ok ? "JSON読取: OK" : "JSON読取: NG（DBに原文とエラーを保存）";
      msg("image-import-msg", "ok", `画像アップロードとDB登録が完了しました。\n${jsonNote}`);
      $("import-json").value = "";
      $("import-file").value = "";
    }
    await Promise.all([loadHistory(), loadStats()]);
  } catch (error) {
    msg("image-import-msg", "err", error.message);
  } finally {
    $("image-import-btn").disabled = false;
  }
}

function parseImportJson(text, resultStatus) {
  if (!text) {
    return buildFallbackJsonPayload("", "JSON入力が空です。", resultStatus);
  }
  try {
    const parsed = JSON.parse(text);
    const evaluationJson = typeof parsed.evaluation_json === "object" && parsed.evaluation_json !== null
      ? parsed.evaluation_json
      : {};
    return {
      ok:true,
      payload:{
        ...parsed,
        final_generation_prompt: parsed.final_generation_prompt || "[JSON_READ_OK_BUT_PROMPT_EMPTY]",
        evaluation_summary: parsed.evaluation_summary || "[JSON_READ_OK_BUT_SUMMARY_EMPTY]",
        evaluation_json:{
          ...evaluationJson,
          result: evaluationJson.result || parsed.result_status || resultStatus,
          json_parse_status:"ok",
        },
        prompt_lesson_candidates: Array.isArray(parsed.prompt_lesson_candidates)
          ? parsed.prompt_lesson_candidates
          : [],
      },
    };
  } catch (error) {
    return buildFallbackJsonPayload(text, error.message, resultStatus);
  }
}

function buildFallbackJsonPayload(rawText, errorMessage, resultStatus) {
  const clippedRaw = rawText.slice(0, 12000);
  return {
    ok:false,
    payload:{
      final_generation_prompt:`[JSON_PARSE_INVALID]\n${clippedRaw || "(empty)"}`,
      evaluation_summary:`[JSON_PARSE_INVALID] ${errorMessage}`,
      evaluation_json:{
        result:resultStatus,
        json_parse_status:"invalid",
        json_parse_error:errorMessage,
        raw_text:clippedRaw,
        repair_needed:true,
      },
      prompt_lesson_candidates:[],
    },
  };
}

async function resolveAttemptNumber(value, episodeId, panelNumber) {
  const parsed = Number(value);
  if (Number.isInteger(parsed) && parsed > 0 && parsed < 2147483647) return parsed;
  const ep = state.episodes.find(item => item.id === episodeId);
  let panelId = ep?.panels?.find(panel => panel.panel_number === panelNumber)?.id;
  if (!panelId) {
    const { data, error } = await sb.from("manga_panels")
      .select("id")
      .eq("episode_id", episodeId)
      .eq("panel_number", panelNumber)
      .limit(1)
      .single();
    if (error) throw new Error(error.message);
    panelId = data.id;
  }
  const { data, error } = await sb.from("generation_attempts")
    .select("attempt_number")
    .eq("panel_id", panelId)
    .order("attempt_number", { ascending:false })
    .limit(1);
  if (error) throw new Error(error.message);
  return Math.max(1, Number(data?.[0]?.attempt_number || 0) + 1);
}

function fileToBase64(file) {

    reader.readAsDataURL(file);
  });
}

function extractDriveFolderId(url) {

}

function csvEscape(value) {
  return `"${String(value ?? "").replace(/"/g, '""')}"`;
}

function csvBuild(rows) {
  return "\uFEFF" + rows.map(row => row.map(csvEscape).join(",")).join("\r\n") + "\r\n";
}

function csvDownload(name, rows) {
  const blob = new Blob([csvBuild(rows)], { type:"text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

function parseCsv(text) {
  const rows = []; let row = [], field = "", inQuotes = false;
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i + 1];
    if (inQuotes) {
      if (c === '"' && n === '"') { field += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\r" && n === "\n") { row.push(field); rows.push(row); row = []; field = ""; i++; }
      else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
      else field += c;
    }
  }
  row.push(field);
  if (row.some(v => v !== "") || rows.length === 0) rows.push(row);
  return rows;
}

async function importCsv() {
  const file = $("csv-file").files[0];
  if (!file) return msg("csv-msg", "err", "CSVファイルを選択してください。");
  const text = await file.text();
  const rows = parseCsv(text);
  const header = rows.shift()?.map(v => v.trim()) || [];
  const expected = ["タイトル","状態","1コマ案","2コマ案","3コマ案","4コマ案","投稿案","PDF URL"];
  if (expected.some((name, i) => header[i] !== name)) return msg("csv-msg", "err", "CSVヘッダーが仕様と一致しません。");
  const summary = { created:0, updated:0, skipped:[] };
  const seenNewTitles = new Set();
  $("csv-import-btn").disabled = true;
  try {
    for (let i = 0; i < rows.length; i++) {
      const line = i + 2;
      const [titleRaw, statusRaw, p1, p2, p3, p4, postText, pdfUrl] = rows[i];
      const title = (titleRaw || "").trim();
      const status = (statusRaw || "").trim();
      if (!title) { summary.skipped.push(`${line}行目: タイトル空欄`); continue; }
      if (!CSV_STATUSES.includes(status)) { summary.skipped.push(`${line}行目: 状態が不正（${status || "空欄"}）`); continue; }
      const existing = state.episodes.find(ep => ep.title === title);
      if (status === "新規作成") {
        if (seenNewTitles.has(title)) { summary.skipped.push(`${line}行目: CSV内で同じ新規タイトルが既出のためスキップ`); continue; }
        if (existing) { summary.skipped.push(`${line}行目: 既存タイトルのため新規作成をスキップ`); continue; }
        seenNewTitles.add(title);
        msg("csv-msg", "info", `${line}行目: ${title} を作成中...`);
        const ep = await createEpisodeWithPanels(title);
        await updateEpisodeAndPanels(ep.id, { status:"未完成", post_text:postText || null, pdf_url:pdfUrl || null }, [p1,p2,p3,p4]);
        const dbEp = await fetchEpisodeById(ep.id);
        await createFolderForEpisode(dbEp);
        summary.created++;
      } else {
        if (!existing) { summary.skipped.push(`${line}行目: 未知タイトルのため更新をスキップ`); continue; }
        await updateEpisodeAndPanels(existing.id, { status, post_text:postText || null, pdf_url:pdfUrl || null }, [p1,p2,p3,p4]);
        summary.updated++;
      }
    }
    await loadAll();
    msg("csv-msg", "ok", `取込完了\n新規作成 ${summary.created}件（フォルダ作成済み）\n更新 ${summary.updated}件\nスキップ ${summary.skipped.length}件${summary.skipped.length ? "\n" + summary.skipped.join("\n") : ""}`);
  } catch (error) {
    msg("csv-msg", "err", error.message);
  } finally {
    $("csv-import-btn").disabled = false;
  }
}
window.importCsv = importCsv;

async function updateEpisodeAndPanels(episodeId, episodePatch, scenes) {
  const epRes = await sb.from("manga_episodes").update(episodePatch).eq("id", episodeId);
  if (epRes.error) throw new Error(epRes.error.message);
  const ep = state.episodes.find(item => item.id === episodeId) || { panels:[] };
  let panels = ep.panels || [];
  if (panels.length < 4) {
    const { data, error } = await sb.from("manga_panels").select("id,panel_number").eq("episode_id", episodeId);
    if (error) throw new Error(error.message);
    panels = data || [];
  }
  for (let i = 0; i < 4; i++) {
    const panel = panels.find(p => p.panel_number === i + 1);
    if (!panel?.id) continue;
    const res = await sb.from("manga_panels").update({ scene_text:scenes[i] || null }).eq("id", panel.id);
    if (res.error) throw new Error(res.error.message);
  }
}

function throwUi(target, error) {
  msg(target, "err", error.message);
  throw error;
}

init();
</script>
